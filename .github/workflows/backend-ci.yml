name: Backend CI

on:
  push:
    branches:
      - main
      - v2

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mental_health
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # IMPORTANT: override localhost issue
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mental_health
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This fetches the entire history so Gitleaks 
          # can find the commits it needs to scan.
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: npm audit (fail on high/critical)
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --redact --exit-code=2

      # Ensure DB is ready before Prisma run
      # 1. Ensure DB is ready before Prisma runs
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up" && exit 0
            echo "Waiting for Postgres..."
            sleep 3
          done
          echo "Postgres failed to start"
          exit 1

      # 2. Generate Prisma Client
      - name: Prisma generate
        working-directory: ./backend
        run: npx prisma generate

      # 3. Create the Tables (Using db push for CI reliability)
      - name: Push Database Schema
        working-directory: ./backend
        run: npx prisma db push
        env:
          # Match this to however your Postgres service container is configured
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/policyforge

      # 4. Seed the Database
      - name: Seed DB
        working-directory: ./backend
        run: npm run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/policyforge
