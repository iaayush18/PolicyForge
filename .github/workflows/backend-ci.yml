name: Backend CI

on:
  push:
    paths:
      - "backend/**"

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mental_health
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # IMPORTANT: override localhost issue
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mental_health
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: npm audit (fail on high/critical)
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      # Ensure DB is ready before Prisma runs
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up" && exit 0
            echo "Waiting for Postgres..."
            sleep 3
          done
          echo "Postgres failed to start"
          exit 1

      - name: Prisma generate
        run: |
          cd backend
          npx prisma generate

      - name: Prisma migrate
        run: |
          cd backend
          npx prisma migrate deploy

      - name: Seed DB
        run: |
          cd backend
          npm run seed