name: Backend CI (Postgres + Prisma)

on:
  push:
    branches: 
     -main
     -v2
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: mental_health
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/mental_health
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      - name: 🧱 Run Migrations
        run: npx prisma migrate deploy

      - name: 🌱 Seed Database (Admin + Data)
        run: npx prisma db seed

  - name: 🐳 Build Backend Image
    run: docker build -t backend:${{ github.sha }} ./backend
