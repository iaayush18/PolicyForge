name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
      - v2

env:
  REGISTRY: ghcr.io

jobs:
  # 1. FRONTEND CI JOB
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: npm audit (initial check)
        run: npm audit || true

      - name: Auto-fix vulnerabilities
        run: npm audit fix || true

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  # 2. BACKEND CI JOB
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Replace this with your actual backend testing/linting steps
      #- name: Run Backend Tests
      # run: echo "Backend CI Passed!"

  # 3. CD - BUILD & PUSH TO GHCR
  build-and-push:
    name: Deploy Images
    needs: [frontend-ci, backend-ci] 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize repo name
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=$REPO" >> $GITHUB_ENV

      - name: Set tag (stable/canary)
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=stable" >> $GITHUB_ENV
          else
            echo "TAG=canary" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- FRONTEND ----------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ env.TAG }}
          build-args: |
            VITE_FLAGSMITH_ENV_ID=${{ secrets.VITE_FLAGSMITH_ENV_ID }}
            VITE_API_BASE=/api
          # Enable Docker Layer Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- BACKEND ----------
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/backend:${{ env.TAG }}
          # Enable Docker Layer Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max