name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      # Step 1: Run audit but DO NOT fail immediately
      - name: npm audit (initial check)
        run: |
          cd frontend
          npm audit || true

      # Step 2: Attempt automatic fix (non-breaking)
      - name: Auto-fix vulnerabilities
        run: |
          cd frontend
          npm audit fix || true

      # Step 3: Re-check and FAIL if still high/critical
      - name: npm audit (fail on high/critical)
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build