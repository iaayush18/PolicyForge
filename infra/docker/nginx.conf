upstream stable_frontend {
    server App-Stable:80;
}

upstream canary_frontend {
    server App-Canary:80;
}

upstream stable_backend {
    server Backend-Stable:5000;
}

server {
    listen 80;

    # 1. Canary Frontend (v2)
    location /v2/ {
        # 'rewrite' removes the /v2 prefix before passing the request to the canary container
        # so the React app inside doesn't get confused about its pathing.
        rewrite ^/v2/(.*)$ /$1 break;
        proxy_pass http://canary_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Stable Frontend (Default)
    location / {
        proxy_pass http://stable_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Unified Backend (Both versions talk to Stable Backend)
    location /api/ {
        proxy_pass http://stable_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}